server:
  port: 8083

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:3306/notification_db
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

jwt:
  secret: ${JWT_SECRET}

# NextSMS — primary SMS gateway for Tanzania
nextsms:
  base-url: ${NEXTSMS_BASE_URL:https://messaging-service.co.tz}
  username: ${NEXTSMS_USERNAME}
  password: ${NEXTSMS_PASSWORD}
  sender-id: SACCOS

# Twilio WhatsApp — guarantor consent, high-value alerts
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:not-configured}
  auth-token:  ${TWILIO_AUTH_TOKEN:not-configured}
  whatsapp-from: ${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
  enabled: ${TWILIO_ENABLED:false}

# FCM — Flutter mobile push
fcm:
  server-key: ${FCM_SERVER_KEY:not-configured}
  enabled: ${FCM_ENABLED:false}

# Retry config
notification:
  max-retries: 3
  retry-delay-seconds: 60
  default-language: SW   # SW | EN

rabbitmq:
  exchange: saccos.events
  queues:
    member-created:         member.created
    loan-approved:          loan.approved
    loan-rejected:          loan.rejected
    loan-disbursed:         loan.disbursed
    contribution-missed:    contribution.missed
    guarantor-consent:      guarantor.consent.requested
    dividend-declared:      dividend.declared
    security-audit:         security.audit.events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.reimagineafrica.notification: INFO
