server:
  port: 8087

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:3306/notification_db
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

jwt:
  secret: ${JWT_SECRET}

nextsms:
  username: ${NEXTSMS_USERNAME:}
  password: ${NEXTSMS_PASSWORD:}
  sender-id: ${NEXTSMS_SENDER_ID:SmartsSMS}
  base-url: https://messaging-service.co.tz/api/sms/v1/text/single

rabbitmq:
  exchange: saccos.events

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.reimagineafrica.notification: INFO
